# Memdot self-host base topology (Tex-disabled default graph).
# Render: docker compose -f infra/compose/compose.yaml config
# Dev:    docker compose -f infra/compose/compose.yaml -f infra/compose/compose.dev.yaml up
# Test:   docker compose -f infra/compose/compose.yaml -f infra/compose/compose.test.yaml up

name: memdot

x-restart-policy: &restart_policy
  restart: unless-stopped
  stop_grace_period: 30s

x-app-resources: &app_resources
  deploy:
    resources:
      limits:
        memory: 256m

x-health-interval: &health_interval
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 30s

networks:
  memdot_public:
    driver: bridge
  memdot_app:
    driver: bridge
  memdot_data:
    driver: bridge
    internal: true
  memdot_workflow:
    driver: bridge
    internal: true
  memdot_observability:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  seaweed_data:
  openbao_data:
  keycloak_data:
  hatchet_certs:
  hatchet_config:
  otel_data:

services:
  caddy:
    <<: *restart_policy
    image: caddy:2.9.1-alpine@sha256:b4e3952384eb9524a887633ce65c752dd7c71314d2c2acf98cd5c715aaa534f0
    networks:
      - memdot_public
      - memdot_app
    ports:
      - "${MEMDOT_HTTP_PORT:-80}:80"
      - "${MEMDOT_HTTPS_PORT:-443}:443"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${MEMDOT_TLS_DIR:-./tls}:/etc/caddy/tls:ro
    deploy:
      resources:
        limits:
          memory: 64m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/healthz"]
      <<: *health_interval
      start_period: 10s
    depends_on:
      web:
        condition: service_healthy
      core:
        condition: service_healthy
      mcp:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

  web:
    <<: [*restart_policy, *app_resources]
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        MEMDOT_SOURCE_HASH: ${SOURCE_HASH:-unknown}
    image: memdot-web:local
    networks:
      - memdot_app
      - memdot_observability
    env_file:
      - path: ${MEMDOT_SECRETS_DIR:-./secrets}/web.env
        required: true
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      OTEL_SDK_DISABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      <<: *health_interval
    security_opt:
      - no-new-privileges:true

  core:
    <<: [*restart_policy, *app_resources]
    build:
      context: ../..
      dockerfile: services/core/Dockerfile
      args:
        MEMDOT_SOURCE_HASH: ${SOURCE_HASH:-unknown}
    image: memdot-core:local
    networks:
      - memdot_app
      - memdot_data
      - memdot_workflow
      - memdot_observability
    env_file:
      - path: ${MEMDOT_SECRETS_DIR:-./secrets}/core.env
        required: true
      - path: ${MEMDOT_SECRETS_DIR:-./secrets}/postgres.env
        required: true
    environment:
      CORE_HOST: 0.0.0.0
      CORE_PORT: "8000"
      OTEL_SDK_DISABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
    volumes:
      - ${MEMDOT_SECRETS_DIR:-./secrets}/openbao_transit_token:/run/secrets/openbao_transit_token:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')",
        ]
      <<: *health_interval
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      openbao:
        condition: service_healthy
      openbao-bootstrap:
        condition: service_completed_successfully
      hatchet-api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

  mcp:
    <<: [*restart_policy, *app_resources]
    build:
      context: ../..
      dockerfile: apps/mcp/Dockerfile
      args:
        MEMDOT_SOURCE_HASH: ${SOURCE_HASH:-unknown}
    image: memdot-mcp:local
    networks:
      - memdot_app
      - memdot_observability
    env_file:
      - path: ${MEMDOT_SECRETS_DIR:-./secrets}/mcp.env
        required: true
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8100"
      OTEL_SDK_DISABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8100/health/ready"]
      <<: *health_interval
    depends_on:
      keycloak:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

  workers:
    <<: [*restart_policy, *app_resources]
    build:
      context: ../..
      dockerfile: services/workers/Dockerfile
      args:
        MEMDOT_SOURCE_HASH: ${SOURCE_HASH:-unknown}
    image: memdot-workers:local
    networks:
      - memdot_app
      - memdot_data
      - memdot_workflow
      - memdot_observability
    env_file:
      - path: ${MEMDOT_SECRETS_DIR:-./secrets}/workers.env
        required: true
    environment:
      WORKERS_HEALTH_HOST: 0.0.0.0
      WORKERS_HEALTH_PORT: "8300"
      WORKERS_HATCHET_HOST: hatchet-engine
      WORKERS_HATCHET_PORT: "7070"
      OTEL_SDK_DISABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8300/health/ready')",
        ]
      <<: *health_interval
    depends_on:
      postgres:
        condition: service_healthy
      hatchet-engine:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

  model-router:
    <<: [*restart_policy, *app_resources]
    build:
      context: ../..
      dockerfile: services/model-router/Dockerfile
      args:
        MEMDOT_SOURCE_HASH: ${SOURCE_HASH:-unknown}
    image: memdot-model-router:local
    networks:
      - memdot_app
      - memdot_observability
    env_file:
      - path: ${MEMDOT_SECRETS_DIR:-./secrets}/model-router.env
        required: true
    environment:
      MODEL_ROUTER_HOST: 0.0.0.0
      MODEL_ROUTER_PORT: "8200"
      MODEL_ROUTER_TEX_ENABLED: "false"
      OTEL_SDK_DISABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8200/health/ready')",
        ]
      <<: *health_interval
    security_opt:
      - no-new-privileges:true

  postgres:
    <<: *restart_policy
    image: pgvector/pgvector:pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
    command: ["postgres", "-c", "max_connections=200"]
    shm_size: 256mb
    networks:
      - memdot_data
      - memdot_workflow
    env_file:
      - path: ${MEMDOT_SECRETS_DIR:-./secrets}/postgres.env
        required: true
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      # Require app DBs from init-databases.sql — pg_isready alone can pass during
      # the temporary initdb server before CREATE DATABASE hatchet completes.
      test:
        [
          "CMD-SHELL",
          'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" && psql -U "$$POSTGRES_USER" -d hatchet -c ''SELECT 1'' >/dev/null && psql -U "$$POSTGRES_USER" -d memdot_ops -c ''SELECT 1'' >/dev/null',
        ]
      <<: *health_interval
      start_period: 40s
    security_opt:
      - no-new-privileges:true

  seaweedfs:
    <<: *restart_policy
    image: chrislusf/seaweedfs:3.80@sha256:1055999e08eed1789b0ae45d235126e4495e23d3fb9d6396293fd42539b1ae6a
    command:
      - server
      - -dir=/data
      - -ip.bind=0.0.0.0
      - -s3
      - -filer
      - -master.port=9333
      - -volume.port=8080
      - -filer.port=8888
      - -s3.port=8333
      - -s3.config=/etc/seaweedfs/s3.json
      - -master.volumeSizeLimitMB=100
    networks:
      - memdot_data
    volumes:
      - seaweed_data:/data
      - ${MEMDOT_SECRETS_DIR:-./secrets}/s3.runtime.json:/etc/seaweedfs/s3.json:ro
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9333/cluster/status"]
      <<: *health_interval
      start_period: 60s
    security_opt:
      - no-new-privileges:true

  keycloak:
    <<: *restart_policy
    image: quay.io/keycloak/keycloak:26.0.7@sha256:4388e2379b7e870a447adbe7b80bd61f5fbf04e925832b19669fda4957f05a81
    # Production-like start behind Caddy. Dev exceptions live in compose.dev.yaml.
    command:
      - start
      - --import-realm
      - --health-enabled=true
      - --http-enabled=true
      - --hostname-strict=true
      - --proxy-headers=xforwarded
    networks:
      - memdot_app
      - memdot_data
    env_file:
      - path: ${MEMDOT_SECRETS_DIR:-./secrets}/keycloak.env
        required: true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "false"
      KC_HOSTNAME: ${MEMDOT_PUBLIC_HOST:-localhost}
      KC_HOSTNAME_PORT: "${MEMDOT_HTTPS_PORT:-443}"
      KC_HOSTNAME_URL: ${MEMDOT_PUBLIC_URL:-https://localhost:8443}
      KC_HOSTNAME_ADMIN_URL: ${MEMDOT_PUBLIC_URL:-https://localhost:8443}
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ${MEMDOT_SECRETS_DIR:-./secrets}/realm-memdot.runtime.json:/opt/keycloak/data/import/realm-memdot.json:ro
    deploy:
      resources:
        limits:
          memory: 768m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'",
        ]
      <<: *health_interval
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

  openbao:
    <<: *restart_policy
    image: openbao/openbao:2.1.0@sha256:7de07aa6df3937d44c96c2d65c188b2d4a70546f2a764ad4510301305af6a223
    # Persistent file storage (not -dev). Bypass entrypoint "server" shim that
    # injects -dev-listen-address and double-binds :8200.
    entrypoint: ["docker-entrypoint.sh"]
    command: ["bao", "server", "-config=/openbao/config/config.hcl"]
    networks:
      - memdot_data
    volumes:
      - openbao_data:/openbao/file
      - ./config/openbao/config.hcl:/openbao/config/config.hcl:ro
    deploy:
      resources:
        limits:
          memory: 128m
    healthcheck:
      # Accept initialized-but-sealed during bootstrap; bootstrap job unseals.
      test:
        [
          "CMD-SHELL",
          "wget -qO- 'http://127.0.0.1:8200/v1/sys/health?standbyok=true&uninitcode=200&sealedcode=200' >/dev/null",
        ]
      <<: *health_interval
      start_period: 15s
    cap_add:
      - IPC_LOCK
    security_opt:
      - no-new-privileges:true

  openbao-bootstrap:
    image: openbao/openbao:2.1.0@sha256:7de07aa6df3937d44c96c2d65c188b2d4a70546f2a764ad4510301305af6a223
    restart: "no"
    networks:
      - memdot_data
    environment:
      BAO_ADDR: http://openbao:8200
      OPENBAO_BOOTSTRAP_DIR: /bootstrap
      OPENBAO_TRANSIT_TOKEN_FILE: /secrets/openbao_transit_token
    volumes:
      - ./scripts/openbao_bootstrap.sh:/bootstrap.sh:ro
      - ${MEMDOT_SECRETS_DIR:-./secrets}/openbao_bootstrap:/bootstrap
      - ${MEMDOT_SECRETS_DIR:-./secrets}:/secrets
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    depends_on:
      openbao:
        condition: service_healthy

  otel-lgtm:
    <<: *restart_policy
    image: grafana/otel-lgtm:0.11.0@sha256:0d4e0cbb87b38112ba4b8e411f81925ab0f78cce3c5b219c327e8b06c1b67c23
    networks:
      - memdot_observability
    environment:
      # External exporters remain disabled; local LGTM stack only.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - otel_data:/data
      - ./config/otel/otel-collector-config.yaml:/otel-lgtm/otelcol-config.yaml:ro
      - ./config/grafana/provisioning:/otel-lgtm/grafana/conf/provisioning:ro
      - ./dashboards:/otel-lgtm/grafana-dashboard-mount:ro
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health >/dev/null"]
      <<: *health_interval
      start_period: 60s
    security_opt:
      - no-new-privileges:true

  hatchet-migrate:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-migrate:v0.55.0@sha256:d67af1b8766eacf7807ae95534c51c11a15782b7ba965cb17d1d95a4050c9165
    command: ["/hatchet/hatchet-migrate"]
    networks:
      - memdot_workflow
      - memdot_data
    env_file:
      - path: ${MEMDOT_SECRETS_DIR:-./secrets}/hatchet.env
        required: true
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  hatchet-setup-config:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-admin:v0.55.0@sha256:273f1439618fa758f4000b90d19adf0185b49c2874de223194e8e51a9544fb62
    command:
      - /hatchet/hatchet-admin
      - quickstart
      - --skip
      - certs
      - --generated-config-dir
      - /hatchet/config
      - --overwrite=false
    networks:
      - memdot_workflow
      - memdot_data
    env_file:
      - path: ${MEMDOT_SECRETS_DIR:-./secrets}/hatchet.env
        required: true
    environment:
      SERVER_MSGQUEUE_KIND: postgres
      SERVER_AUTH_COOKIE_DOMAIN: ${HATCHET_COOKIE_DOMAIN:-localhost}
      SERVER_AUTH_COOKIE_INSECURE: "t"
      SERVER_GRPC_BIND_ADDRESS: 0.0.0.0
      SERVER_GRPC_INSECURE: "t"
      SERVER_GRPC_BROADCAST_ADDRESS: hatchet-engine:7070
      SERVER_DEFAULT_ENGINE_VERSION: V1
      SERVER_INTERNAL_CLIENT_INTERNAL_GRPC_BROADCAST_ADDRESS: hatchet-engine:7070
    volumes:
      - hatchet_certs:/hatchet/certs
      - hatchet_config:/hatchet/config
    restart: "no"
    depends_on:
      hatchet-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  hatchet-engine:
    <<: *restart_policy
    image: ghcr.io/hatchet-dev/hatchet/hatchet-engine:v0.55.0@sha256:07f73dacda61cf11f4e9040ea1b8b0bf2ba15ae8b717cb197212d85e259e1c66
    command: ["/hatchet/hatchet-engine", "--config", "/hatchet/config"]
    networks:
      - memdot_workflow
      - memdot_data
    env_file:
      - path: ${MEMDOT_SECRETS_DIR:-./secrets}/hatchet.env
        required: true
    environment:
      SERVER_MSGQUEUE_KIND: postgres
      SERVER_GRPC_BIND_ADDRESS: 0.0.0.0
      SERVER_GRPC_INSECURE: "t"
    volumes:
      - hatchet_certs:/hatchet/certs
      - hatchet_config:/hatchet/config
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 7070"]
      <<: *health_interval
      start_period: 45s
    depends_on:
      hatchet-setup-config:
        condition: service_completed_successfully
      hatchet-migrate:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true

  hatchet-api:
    <<: *restart_policy
    image: ghcr.io/hatchet-dev/hatchet/hatchet-api:v0.55.0@sha256:3daa7a676015a6f683f266c3eb8e93011c0a41bdbe2e6643c968912f2a9af965
    command: ["/hatchet/hatchet-api", "--config", "/hatchet/config"]
    networks:
      - memdot_workflow
      - memdot_data
      - memdot_app
    env_file:
      - path: ${MEMDOT_SECRETS_DIR:-./secrets}/hatchet.env
        required: true
    environment:
      SERVER_MSGQUEUE_KIND: postgres
      SERVER_PORT: "8080"
      SERVER_URL: ${HATCHET_SERVER_URL:-http://127.0.0.1:18080}
      SERVER_AUTH_COOKIE_DOMAIN: ${HATCHET_COOKIE_DOMAIN:-localhost}
      SERVER_AUTH_COOKIE_INSECURE: "t"
      SERVER_GRPC_BROADCAST_ADDRESS: hatchet-engine:7070
      SERVER_GRPC_INSECURE: "t"
      SERVER_INTERNAL_CLIENT_INTERNAL_GRPC_BROADCAST_ADDRESS: hatchet-engine:7070
    volumes:
      - hatchet_certs:/hatchet/certs
      - hatchet_config:/hatchet/config
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8080/api/ready || wget -qO- http://127.0.0.1:8080/live",
        ]
      <<: *health_interval
      start_period: 45s
    depends_on:
      hatchet-setup-config:
        condition: service_completed_successfully
      hatchet-migrate:
        condition: service_completed_successfully
      hatchet-engine:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

  hatchet-dashboard:
    <<: *restart_policy
    profiles: ["operator"]
    image: ghcr.io/hatchet-dev/hatchet/hatchet-dashboard:v0.55.0@sha256:5cd248da635bf3054b6d0872afca3264db1072c0da6054e21f547d6c7cebb3c2
    command: ["sh", "./entrypoint.sh", "--config", "/hatchet/config"]
    ports:
      - "127.0.0.1:8081:80"
    networks:
      - memdot_workflow
    env_file:
      - path: ${MEMDOT_SECRETS_DIR:-./secrets}/hatchet.env
        required: true
    volumes:
      - hatchet_certs:/hatchet/certs
      - hatchet_config:/hatchet/config
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      <<: *health_interval
      start_period: 30s
    depends_on:
      hatchet-setup-config:
        condition: service_completed_successfully
      hatchet-api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

  # providers profile intentionally empty — Tex is NOT part of the default or optional graph.
