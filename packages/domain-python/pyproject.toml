[project]
name = "memdot-domain"
version = "0.1.0"
description = "Memdot domain types and inward-facing provider ports"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.11.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/memdot_domain"]

[tool.hatch.build.targets.sdist]
include = ["src/memdot_domain"]
