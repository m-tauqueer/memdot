[project]
name = "memdot-provider-adapters"
version = "0.1.0"
description = "Outward provider adapter implementations (depend inward on domain ports)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "memdot-domain",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/memdot_provider_adapters"]

[tool.uv.sources]
memdot-domain = { workspace = true }
